<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>病害编辑 · 小麦病虫害智能检测系统</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@6.6.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/pages/disease.css">
</head>
<body>
  <header id="app-header"></header>
  <aside id="app-sidebar"></aside>
  <main class="app-main">
    <div class="page">
      <div id="app-breadcrumb"></div>
      <div class="page-header">
        <div>
          <h1 class="page-title" id="pageTitle">新增病害</h1>
          <div class="page-subtitle" id="pageSubtitle">填写病害基本信息、症状、诱因与防治方法</div>
        </div>
        <button class="btn btn--outline" id="backBtn"><i class="fas fa-arrow-left"></i>返回列表</button>
      </div>

      <form id="diseaseForm" class="card" autocomplete="off">
        <div class="form-grid">
          <div class="form-item">
            <label class="form-label is-required">模型类别（英文）</label>
            <select class="select" id="className" required>
              <option value="">请选择</option>
              <option value="rust">rust — 锈病</option>
              <option value="smut">smut — 黑穗病</option>
              <option value="healthy">healthy — 健康叶</option>
              <option value="aphid">aphid — 蚜虫</option>
            </select>
          </div>
          <div class="form-item">
            <label class="form-label is-required">中文名</label>
            <input type="text" class="input" id="chineseName" maxlength="50" placeholder="请输入中文名" />
          </div>
          <div class="form-item">
            <label class="form-label">别名</label>
            <input type="text" class="input" id="alias" maxlength="200" placeholder="多个别名用逗号分隔" />
          </div>
          <div class="form-item">
            <label class="form-label is-required">危害等级</label>
            <select class="select" id="severityLevel">
              <option value="1">轻度</option>
              <option value="2">中度</option>
              <option value="3">重度</option>
            </select>
          </div>
          <div class="form-item form-grid__full">
            <label class="form-label is-required">症状描述</label>
            <textarea class="textarea" id="symptom" rows="6" maxlength="2000" placeholder="请详细描述病害在叶、茎、穗等部位的典型症状..."></textarea>
          </div>
          <div class="form-item form-grid__full">
            <label class="form-label is-required">发病原因</label>
            <textarea class="textarea" id="cause" rows="6" maxlength="2000" placeholder="请描述病害的病原、传播途径、适宜发病条件等..."></textarea>
          </div>
          <div class="form-item form-grid__full">
            <label class="form-label is-required">防治方法</label>
            <textarea class="textarea" id="prevention" rows="6" maxlength="2000" placeholder="请描述防治措施、药剂选择、用药时机等..."></textarea>
          </div>
          <div class="form-item form-grid__full">
            <label class="form-label">示例图片（jpg / png，≤ 5MB）</label>
            <input type="file" id="exampleImage" accept=".jpg,.jpeg,.png" class="input" style="padding:6px 12px" />
            <div id="imagePreview" style="margin-top:12px"></div>
          </div>
        </div>

        <div class="action-bar" style="margin-top:24px">
          <div style="flex:1"></div>
          <button type="button" class="btn btn--outline" id="cancelBtn">取消</button>
          <button type="submit" class="btn btn--primary" id="saveBtn"><i class="fas fa-floppy-disk"></i>保存</button>
        </div>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.7.7/dist/axios.min.js"></script>
  <script src="/assets/js/common.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/permission.js"></script>
  <script src="/assets/js/router.js"></script>
  <script src="/assets/js/layout.js"></script>
  <script src="/assets/js/pages/disease_edit.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>病害知识库 · 小麦病虫害智能检测系统</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@6.6.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/pages/disease.css">
</head>
<body>
  <header id="app-header"></header>
  <aside id="app-sidebar"></aside>
  <main class="app-main">
    <div class="page">
      <div id="app-breadcrumb"></div>
      <div class="page-header">
        <div>
          <h1 class="page-title">病害知识库</h1>
          <div class="page-subtitle">内置 4 类小麦病虫害的症状、诱因与防治方法</div>
        </div>
        <button class="btn btn--primary" id="addBtn" data-perm="disease:create"><i class="fas fa-plus"></i>新增病害</button>
      </div>

      <div class="filter-bar">
        <input type="text" class="input input--search" id="filterKeyword" placeholder="中文名 / 英文名 / 别名" />
        <select class="select" id="filterSeverity">
          <option value="">全部等级</option>
          <option value="1">轻度</option>
          <option value="2">中度</option>
          <option value="3">重度</option>
        </select>
        <button class="btn btn--primary" id="queryBtn"><i class="fas fa-magnifying-glass"></i>查询</button>
        <button class="btn btn--text" id="resetBtn"><i class="fas fa-rotate"></i>重置</button>
      </div>

      <div class="disease-grid" id="diseaseGrid"></div>
      <div class="pagination" id="diseasePagination" style="background:#fff;border:1px solid var(--color-border-light);border-radius:var(--radius-md)"></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.7.7/dist/axios.min.js"></script>
  <script src="/assets/js/common.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/permission.js"></script>
  <script src="/assets/js/router.js"></script>
  <script src="/assets/js/layout.js"></script>
  <script src="/assets/js/pages/disease_library.js"></script>
</body>
</html>

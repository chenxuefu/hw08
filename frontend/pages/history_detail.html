<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>检测详情 · 小麦病虫害智能检测系统</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@6.6.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/pages/detection.css">
</head>
<body>
  <header id="app-header"></header>
  <aside id="app-sidebar"></aside>
  <main class="app-main">
    <div class="page">
      <div id="app-breadcrumb"></div>
      <div class="page-header">
        <div>
          <h1 class="page-title" id="pageTitle">检测详情</h1>
          <div class="page-subtitle" id="pageSubtitle">完整的检测记录与明细信息</div>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn btn--outline" id="backBtn"><i class="fas fa-arrow-left"></i>返回列表</button>
          <button class="btn btn--primary" id="downloadBtn" data-perm="detection:record:download"><i class="fas fa-download"></i>下载结果图</button>
        </div>
      </div>

      <div class="history-detail-layout">
        <div class="card" style="padding:0">
          <div class="history-detail__images" style="padding:20px">
            <div class="detection-image-card">
              <div class="detection-image-card__header">原图</div>
              <div class="detection-image-card__body" id="originBox">
                <div class="loading-spinner"></div>
              </div>
            </div>
            <div class="detection-image-card">
              <div class="detection-image-card__header">检测结果</div>
              <div class="detection-image-card__body" id="resultBox">
                <div class="loading-spinner"></div>
              </div>
            </div>
          </div>
          <div class="card__header" style="margin:0;padding:16px 20px;border-top:1px solid var(--color-border-light);border-bottom:1px solid var(--color-border-light)">
            <div class="card__title" style="font-size:var(--fs-md)">检测明细</div>
          </div>
          <div class="table-wrapper" style="border:none;border-radius:0">
            <table class="table">
              <thead>
                <tr>
                  <th class="col-id">序号</th>
                  <th class="col-name">类别</th>
                  <th>置信度</th>
                  <th>bbox_x</th>
                  <th>bbox_y</th>
                  <th>bbox_w</th>
                  <th>bbox_h</th>
                </tr>
              </thead>
              <tbody id="resultsTbody"></tbody>
            </table>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:16px">
          <div class="card">
            <div class="card__header"><div class="card__title">记录信息</div></div>
            <div class="info-list" id="infoList"></div>
          </div>
          <div class="card">
            <div class="card__header"><div class="card__title">类别分布</div></div>
            <div id="classDist"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.7.7/dist/axios.min.js"></script>
  <script src="/assets/js/common.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/permission.js"></script>
  <script src="/assets/js/router.js"></script>
  <script src="/assets/js/layout.js"></script>
  <script src="/assets/js/pages/history_detail.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>模型版本 · 小麦病虫害智能检测系统</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@6.6.0/css/all.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
</head>
<body>
  <header id="app-header"></header>
  <aside id="app-sidebar"></aside>
  <main class="app-main">
    <div class="page">
      <div id="app-breadcrumb"></div>
      <div class="page-header">
        <div>
          <h1 class="page-title">模型版本</h1>
          <div class="page-subtitle">管理 RT-DETR 模型权重版本与精度指标</div>
        </div>
      </div>

      <div class="filter-bar">
        <input type="text" class="input input--search" id="filterVersion" placeholder="版本号" />
        <select class="select" id="filterActive">
          <option value="">全部启用状态</option>
          <option value="1">当前启用</option>
          <option value="0">未启用</option>
        </select>
        <button class="btn btn--primary" id="queryBtn"><i class="fas fa-magnifying-glass"></i>查询</button>
        <button class="btn btn--text" id="resetBtn"><i class="fas fa-rotate"></i>重置</button>
      </div>

      <div class="action-bar">
        <button class="btn btn--primary" id="addBtn" data-perm="model:create"><i class="fas fa-plus"></i>注册新版本</button>
        <div style="flex:1"></div>
      </div>

      <div class="card" style="padding:0">
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr>
                <th class="col-id">ID</th>
                <th>版本号</th>
                <th class="col-flex">模型名称</th>
                <th>权重路径</th>
                <th>mAP@0.5</th>
                <th>mAP@0.5:0.95</th>
                <th>精确率</th>
                <th>召回率</th>
                <th class="col-status">启用状态</th>
                <th class="col-time">创建时间</th>
                <th class="col-action">操作</th>
              </tr>
            </thead>
            <tbody id="versionTbody"></tbody>
          </table>
        </div>
        <div class="pagination" id="versionPagination"></div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.7.7/dist/axios.min.js"></script>
  <script src="/assets/js/common.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/permission.js"></script>
  <script src="/assets/js/router.js"></script>
  <script src="/assets/js/layout.js"></script>
  <script src="/assets/js/pages/model_version.js"></script>
</body>
</html>
